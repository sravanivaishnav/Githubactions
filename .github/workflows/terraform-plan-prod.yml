name: "Terraform Plan — Prod (westeurope)"

on:
  push:
    branches: [main]
    paths:
      - "opella-challenge/environments/prod/**"
      - "opella-challenge/modules/**"
  pull_request:
    branches: [main]
    paths:
      - "opella-challenge/environments/prod/**"
      - "opella-challenge/modules/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.10.5"
  WORKING_DIR: "opella-challenge/environments/prod"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: "true"

jobs:
  terraform-plan:
    name: "Plan (prod)"
    runs-on: ubuntu-latest
    # No GitHub Environment here — OIDC uses ref:refs/heads/main subject
    # (environment:prod is only needed on the apply job for the approval gate)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Init (with remote backend)
        id: init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=opella-prod.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: Generate SSH key (for vm_public_key variable)
        run: |
          ssh-keygen -t rsa -b 4096 -f /tmp/vm_key -N ""
          echo "VM_PUBLIC_KEY=$(cat /tmp/vm_key.pub)" >> $GITHUB_ENV

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -input=false -no-color \
            -var="vm_public_key=${{ env.VM_PUBLIC_KEY }}" \
            -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const output = `#### Prod Environment — Terraform Plan

            | Step | Status |
            |------|--------|
            | Format   | ${{ steps.fmt.outcome == 'success' && '✅' || '❌' }} |
            | Init     | ${{ steps.init.outcome == 'success' && '✅' || '❌' }} |
            | Validate | ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} |
            | Plan     | ${{ steps.plan.outcome == 'success' && '✅' || '❌' }} |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`
            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Plan artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  # ── Apply job is commented out intentionally ──────────────────────────────
