name: Azure Login Debug

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "assesmnet project/infra/**"
      - ".github/workflows/**"        # ← triggers when workflow file changes too

permissions:
  id-token: write
  contents: read

jobs:
  debug-azure:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "assesmnet project/infra"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner: $RUNNER_OS | $RUNNER_TEMP"

      - name: Check secrets presence (no values shown)
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ];        then echo "AZURE_CLIENT_ID: missing";        else echo "AZURE_CLIENT_ID: present";        fi
          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ];        then echo "AZURE_TENANT_ID: missing";        else echo "AZURE_TENANT_ID: present";        fi
          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ];  then echo "AZURE_SUBSCRIPTION_ID: missing";  else echo "AZURE_SUBSCRIPTION_ID: present";  fi
          if [ -z "${{ secrets.TF_STATE_RG }}" ];            then echo "TF_STATE_RG: missing";            else echo "TF_STATE_RG: present";            fi
          if [ -z "${{ secrets.TF_STATE_STORAGE }}" ];       then echo "TF_STATE_STORAGE: missing";       else echo "TF_STATE_STORAGE: present";       fi
          if [ -z "${{ secrets.TF_STATE_CONTAINER }}" ];     then echo "TF_STATE_CONTAINER: missing";     else echo "TF_STATE_CONTAINER: present";     fi
          if [ -z "${{ secrets.TF_STATE_KEY }}" ];           then echo "TF_STATE_KEY: missing";           else echo "TF_STATE_KEY: present";           fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show logged-in account
        run: az account show

      - name: Terraform version
        run: terraform -version || true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -var-file="terraform.tfvars"
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
